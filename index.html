<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I'll WIN Planner Pro</title>

<style>
:root{
--main-border:#222;
--bg-gray:#f8f8f8;
--today-blue:#00c2ff;
}

body{
margin:0;
padding:0;
background:var(--bg-gray);
font-family:Pretendard,sans-serif;
height:100vh;
overflow:hidden;
color:#333;
}

.global-header{
background:#fff;
padding:12px 18px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
}

.app-logo{
font-size:20px;
font-weight:900;
font-style:italic;
}

.page{
display:none;
padding:15px;
padding-bottom:90px;
overflow-y:auto;
height:calc(100vh - 120px);
background:#fff;
max-width:500px;
margin:auto;
}

.page.active{display:block;}

.section{
border:1px solid #222;
padding:12px;
margin-bottom:15px;
position:relative;
}

.title{
font-size:10px;
font-weight:bold;
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

.nav-bar{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:500px;
height:60px;
background:#111;
display:flex;
}

.nav-item{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:#777;
font-size:10px;
}

.nav-item.active-nav{
background:#222;
color:#fff;
}

.add-btn-sm{
position:absolute;
right:8px;
top:8px;
border:none;
padding:5px 10px;
background:#f0f0f0;
cursor:pointer;
border-radius:5px;
}

.tt-container{
border:1px solid #eee;
}

.tt-row{
display:flex;
height:28px;
border-bottom:1px solid #eee;
}

.tt-time{
width:38px;
font-size:10px;
display:flex;
align-items:center;
justify-content:center;
background:#fafafa;
border-right:1px solid #eee;
}

.tt-slots{
flex:1;
display:grid;
grid-template-columns:repeat(6,1fr);
}

.slot{
border-right:1px solid #f3f3f3;
position:relative;
cursor:pointer;
}

.slot-text{
font-size:7px;
position:absolute;
top:2px;
left:2px;
white-space:nowrap;
}

.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal{
background:#fff;
width:85%;
max-width:320px;
padding:20px;
border-radius:12px;
}

.modal input,.modal select{
width:100%;
height:44px;
margin-bottom:10px;
padding:0 10px;
box-sizing:border-box;
}

.modal button{
width:100%;
padding:12px;
margin-top:6px;
cursor:pointer;
}

.list-item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px dashed #eee;
font-size:12px;
}

#daily-review{
width:100%;
min-height:80px;
resize:none;
border:none;
outline:none;
font-size:14px;
overflow:hidden;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
}

.cal-date{
aspect-ratio:1;
border-radius:10px;
background:#fafafa;
font-size:10px;
padding:4px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
}

.cal-date.today{
background:var(--today-blue);
color:#fff;
}

.study-mini{
font-size:8px;
margin-top:2px;
opacity:.7;
}

#routine-svg{
width:100%;
}

.routine-label{
font-size:10px;
margin-bottom:4px;
}
</style>
</head>

<body>

<header class="global-header">
<div class="app-logo">I'll WIN</div>
<input type="date" id="date-picker" onchange="syncDate(this.value)">
</header>

<div id="page1" class="page active">

<div class="section">
<div class="title">TO-DO LIST</div>
<div id="todo-list"></div>
</div>

<div class="section">
<div class="title">TIME TABLE</div>
<button class="add-btn-sm" onclick="openModal('timetable')">ADD</button>
<div class="tt-container" id="tt-rows"></div>
</div>

</div>

<div id="page2" class="page">

<div class="section">
<div class="title">ROUTINE</div>
<button class="add-btn-sm" onclick="openModal('routine')">+</button>

<svg id="routine-svg" viewBox="0 0 32 32">
<circle r="16" cx="16" cy="16" fill="#f5f5f5"></circle>
<g id="routine-paths"></g>
<circle r="9" cx="16" cy="16" fill="white"></circle>
</svg>

<div id="routine-list-items"></div>
</div>

<div class="section">
<div class="title">STUDY</div>
<div id="disp-study" onclick="openModal('study')" style="font-size:24px;font-weight:bold;">00:00</div>
</div>

<div class="section">
<div class="title">DAILY REVIEW</div>
<textarea id="daily-review" placeholder="오늘 하루는 어땠나요?"></textarea>
</div>

</div>

<div id="page3" class="page">

<div class="section">
<div class="title">MONTHLY STUDY CALENDAR</div>
<div id="monthly-study-total" style="font-size:24px;font-weight:bold;margin-bottom:12px;">0h 0m</div>
<div class="calendar-grid" id="calendar-grid"></div>
</div>

</div>

<nav class="nav-bar">
<div class="nav-item active-nav" onclick="switchPage(1,this)">📅 PLAN</div>
<div class="nav-item" onclick="switchPage(2,this)">📊 STATS</div>
<div class="nav-item" onclick="switchPage(3,this)">⚙️ CAT</div>
</nav>

<div class="modal-overlay" id="modal-overlay">
<div class="modal">
<h3 id="modal-title">EDIT</h3>
<div id="modal-inputs"></div>
<button onclick="saveModal()">SAVE</button>
<button onclick="closeModal()">CANCEL</button>
<button id="delete-btn" style="background:#ffdddd;display:none;" onclick="deleteCurrentItem()">DELETE</button>
</div>
</div>

<script>

let selectedDate = new Date().toISOString().split('T')[0];
let currentMode = '';
let editIdx = -1;

let db = JSON.parse(localStorage.getItem('illWinDB')) || {};

let categories = [
{name:'전공',color:'#ffadad'},
{name:'교양',color:'#a0c4ff'},
{name:'기타',color:'#fdffb6'}
];

window.onload = () => {

document.getElementById('date-picker').value = selectedDate;

const todoWrap = document.getElementById('todo-list');

for(let i=0;i<6;i++){
todoWrap.innerHTML += `
<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;">
<input type="checkbox" id="td-c-${i}" onchange="saveCurrentDate()">
<input type="text" id="td-t-${i}" oninput="saveCurrentDate()" placeholder="할 일을 입력하세요..." style="flex:1;border:none;outline:none;padding-left:10px;">
</div>
`;
}

loadDateData();

document.getElementById('daily-review').addEventListener('input', autoResizeReview);

};

function switchPage(p,el){

document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));
document.getElementById('page'+p).classList.add('active');

document.querySelectorAll('.nav-item').forEach(v=>v.classList.remove('active-nav'));
el.classList.add('active-nav');

if(p===3) renderCalendar();

}

function syncDate(date){
selectedDate=date;
loadDateData();
}

function getDateData(){

if(!db[selectedDate]){
db[selectedDate]={
todo:[],
tt:[],
routine:[],
study:"00:00",
review:""
};
}

return db[selectedDate];
}

function loadDateData(){

const data = getDateData();

for(let i=0;i<6;i++){

const item = data.todo[i] || {text:'',checked:false};

document.getElementById(`td-t-${i}`).value = item.text;
document.getElementById(`td-c-${i}`).checked = item.checked;

}

initTimeTable();

(data.tt || []).forEach((item,idx)=>{
fillTT(item,idx);
});

renderRoutine();

document.getElementById('disp-study').innerText = data.study || "00:00";

const review = document.getElementById('daily-review');
review.value = data.review || '';
autoResizeReview();

renderCalendar();
updateMonthlyTotal();

}

function saveCurrentDate(){

const data = getDateData();

data.todo = [];

for(let i=0;i<6;i++){
data.todo.push({
text:document.getElementById(`td-t-${i}`).value,
checked:document.getElementById(`td-c-${i}`).checked
});
}

data.review = document.getElementById('daily-review').value;

localStorage.setItem('illWinDB',JSON.stringify(db));

}

function initTimeTable(){

const rows = document.getElementById('tt-rows');

rows.innerHTML='';

for(let h=6;h<=23;h++){

let slots='';

for(let m=0;m<60;m+=10){

slots += `<div class="slot" id="tt-${h}-${m}" onclick="handleSlotClick(${h},${m})"></div>`;

}

rows.innerHTML += `
<div class="tt-row">
<div class="tt-time">${String(h).padStart(2,'0')}</div>
<div class="tt-slots">${slots}</div>
</div>
`;

}

}

function handleSlotClick(h,m){

const data = getDateData();

const minute = h*60+m;

const foundIdx = data.tt.findIndex(item=>{

const [sh,sm] = item.s.split(':').map(Number);
const [eh,em] = item.e.split(':').map(Number);

return minute >= (sh*60+sm) && minute < (eh*60+em);

});

if(foundIdx > -1){
openModal('timetable',foundIdx);
}

}

function fillTT(item,idx){

const [sh,sm] = item.s.split(':').map(Number);
const [eh,em] = item.e.split(':').map(Number);

let first = true;

for(let h=6;h<=23;h++){

for(let m=0;m<60;m+=10){

const cur = h*60+m;

if(cur >= sh*60+sm && cur < eh*60+em){

const el = document.getElementById(`tt-${h}-${m}`);

if(el){

el.style.background = item.color;
el.dataset.idx = idx;

if(first){
el.innerHTML = `<span class="slot-text">${item.desc}</span>`;
first=false;
}

}

}

}

}

}

function openModal(mode,idx=-1){

currentMode = mode;
editIdx = idx;

document.getElementById('modal-overlay').style.display='flex';

const area = document.getElementById('modal-inputs');

const data = getDateData();

document.getElementById('delete-btn').style.display = idx > -1 ? 'block' : 'none';

if(mode==='timetable' || mode==='routine'){

const key = mode==='timetable' ? 'tt' : 'routine';

const item = idx > -1 ? data[key][idx] : {s:'',e:'',desc:''};

area.innerHTML = `
<input type="time" id="m-s" step="600" value="${item.s}">
<input type="time" id="m-e" step="600" value="${item.e}">
<input type="text" id="m-desc" value="${item.desc || ''}" placeholder="내용">
<select id="m-cat">
${categories.map((c,i)=>`<option value="${i}">${c.name}</option>`).join('')}
</select>
`;

}

if(mode==='study'){

area.innerHTML = `
<input type="text" id="m-study" value="${data.study || ''}" placeholder="0730 또는 07:30">
`;

}

}

function saveModal(){

const data = getDateData();

if(currentMode==='timetable' || currentMode==='routine'){

const key = currentMode==='timetable' ? 'tt' : 'routine';

const cat = categories[document.getElementById('m-cat').value];

const obj = {
s:document.getElementById('m-s').value,
e:document.getElementById('m-e').value,
desc:document.getElementById('m-desc').value,
color:cat.color
};

if(editIdx > -1){
data[key][editIdx] = obj;
}else{
data[key].push(obj);
}

}

if(currentMode==='study'){

let value = document.getElementById('m-study').value.replace(/[^0-9]/g,'');

if(value.length===3){
value = '0'+value;
}

if(value.length===4){
value = value.slice(0,2)+':'+value.slice(2);
}

data.study = value;

}

localStorage.setItem('illWinDB',JSON.stringify(db));

closeModal();

loadDateData();

}

function deleteCurrentItem(){

const data = getDateData();

if(currentMode==='timetable'){
data.tt.splice(editIdx,1);
}

if(currentMode==='routine'){
data.routine.splice(editIdx,1);
}

localStorage.setItem('illWinDB',JSON.stringify(db));

closeModal();

loadDateData();

}

function closeModal(){

document.getElementById('modal-overlay').style.display='none';

}

function drawArc(s,e,color,text){

const [sh,sm] = s.split(':').map(Number);
const [eh,em] = e.split(':').map(Number);

const startDeg = ((sh*60+sm)/1440)*360 - 90;
const endDeg = ((eh*60+em)/1440)*360 - 90;

const rad = Math.PI/180;

const x1 = 16 + 16*Math.cos(startDeg*rad);
const y1 = 16 + 16*Math.sin(startDeg*rad);

const x2 = 16 + 16*Math.cos(endDeg*rad);
const y2 = 16 + 16*Math.sin(endDeg*rad);

const largeArc = (endDeg-startDeg)>180 ? 1 : 0;

const path = document.createElementNS("http://www.w3.org/2000/svg","path");

path.setAttribute("d",`M 16 16 L ${x1} ${y1} A 16 16 0 ${largeArc} 1 ${x2} ${y2} Z`);
path.setAttribute("fill",color);

document.getElementById('routine-paths').appendChild(path);

}

function renderRoutine(){

document.getElementById('routine-paths').innerHTML='';

const list = document.getElementById('routine-list-items');

list.innerHTML='';

const data = getDateData();

(data.routine || []).forEach((item,idx)=>{

drawArc(item.s,item.e,item.color,item.desc);

list.innerHTML += `
<div class="list-item">
<span onclick="openModal('routine',${idx})">
${item.s} ~ ${item.e} | ${item.desc}
</span>
</div>
`;

});

}

function autoResizeReview(){

const ta = document.getElementById('daily-review');

ta.style.height='auto';
ta.style.height = ta.scrollHeight + 'px';

saveCurrentDate();

}

function renderCalendar(){

const grid = document.getElementById('calendar-grid');

grid.innerHTML='';

const [y,m] = selectedDate.split('-').map(Number);

const firstDay = new Date(y,m-1,1).getDay();

const lastDate = new Date(y,m,0).getDate();

for(let i=0;i<firstDay;i++){
grid.innerHTML += `<div></div>`;
}

for(let d=1;d<=lastDate;d++){

const dStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const study = db[dStr]?.study || '00:00';

grid.innerHTML += `
<div class="cal-date ${dStr===new Date().toISOString().split('T')[0] ? 'today':''}" onclick="syncDate('${dStr}')">
<div>${d}</div>
<div class="study-mini">${study}</div>
</div>
`;

}

}

function updateMonthlyTotal(){

const target = selectedDate.substring(0,7);

let total=0;

for(let date in db){

if(date.startsWith(target)){

const study = db[date].study || '00:00';

const [h,m] = study.split(':').map(Number);

total += (h*60)+(m||0);

}

}

document.getElementById('monthly-study-total').innerText =
`${Math.floor(total/60)}h ${total%60}m`;

}

</script>

</body>
</html>
