<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Timetable</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:430px;
padding:20px;
box-sizing:border-box;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:800;
font-style:italic;
}

.card{
background:#0d0d0d;
border:1px solid #222;
border-radius:24px;
padding:20px;
margin-bottom:18px;
}

.circle-wrap{
position:relative;
width:100%;
aspect-ratio:1;
display:flex;
justify-content:center;
align-items:center;
}

.center-info{
position:absolute;
text-align:center;
z-index:5;
}

.center-info .main{
font-size:34px;
font-weight:700;
}

.center-info .sub{
font-size:12px;
color:#888;
margin-top:4px;
}

svg{
width:100%;
height:100%;
overflow:visible;
}

.hour-label{
fill:#666;
font-size:3.5px;
}

.time-label{
fill:#fff;
font-size:2.8px;
}

.needle{
stroke:#fff;
stroke-width:.5;
}

.list{
margin-top:20px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #1c1c1c;
}

.left{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.subject{
font-size:14px;
font-weight:600;
}

.time{
font-size:12px;
color:#888;
margin-top:3px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:18px;
}

.stat-box{
background:#111;
border-radius:18px;
padding:16px;
border:1px solid #222;
}

.stat-title{
font-size:11px;
color:#888;
margin-bottom:8px;
}

.stat-value{
font-size:24px;
font-weight:700;
}

.bar-wrap{
margin-top:10px;
}

.bar{
height:10px;
background:#1d1d1d;
border-radius:999px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
background:#fff;
border-radius:999px;
}

.week{
display:flex;
justify-content:space-between;
font-size:11px;
color:#888;
margin-top:4px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">I'll WIN</div>
<div id="clock"></div>
</div>

<div class="card">

<div class="circle-wrap">

<div class="center-info">
<div class="main" id="totalStudy">7H 30M</div>
<div class="sub">TODAY STUDY</div>
</div>

<svg viewBox="0 0 100 100">

<circle cx="50" cy="50" r="38" fill="none" stroke="#151515" stroke-width="18"/>

<g id="ticks"></g>
<g id="arcs"></g>

<line id="needle"
x1="50"
y1="50"
x2="50"
y2="12"
class="needle"
/>

</svg>

</div>

<div class="list" id="routineList"></div>

</div>

<div class="stats">

<div class="stat-box">
<div class="stat-title">FOCUS</div>
<div class="stat-value" id="focusVal">94%</div>
</div>

<div class="stat-box">
<div class="stat-title">D-DAY</div>
<div class="stat-value" id="dday">D-32</div>
</div>

</div>

<div class="card">

<div class="stat-title">WEEKLY STUDY</div>

<div class="bar-wrap">

<div class="bar"><div class="fill" style="width:82%"></div></div>
<div class="week">
<span>MON</span><span>8H</span>
</div>

<div class="bar"><div class="fill" style="width:65%"></div></div>
<div class="week">
<span>TUE</span><span>6H</span>
</div>

<div class="bar"><div class="fill" style="width:92%"></div></div>
<div class="week">
<span>WED</span><span>9H</span>
</div>

</div>

</div>

</div>

<script>

const routines = [
{
subject:'헌법',
start:'07:00',
end:'09:00',
color:'#7dd3fc'
},
{
subject:'행정학',
start:'10:00',
end:'13:00',
color:'#86efac'
},
{
subject:'경제학',
start:'15:00',
end:'18:30',
color:'#fca5a5'
}
];

const goalStudyMinutes = 480;

function timeToMinutes(t){
const [h,m] = t.split(':').map(Number);
return h*60+m;
}

function polar(cx,cy,r,deg){
const rad = (deg-90) * Math.PI / 180;
return {
x: cx + r * Math.cos(rad),
y: cy + r * Math.sin(rad)
};
}

function describeArc(start,end){

const startAngle = start/1440*360;
const endAngle = end/1440*360;

const s = polar(50,50,38,startAngle);
const e = polar(50,50,38,endAngle);

const large = endAngle - startAngle <= 180 ? 0 : 1;

return `
M 50 50
L ${s.x} ${s.y}
A 38 38 0 ${large} 1 ${e.x} ${e.y}
Z
`;
}

function renderTicks(){

const wrap = document.getElementById('ticks');

for(let h=0; h<24; h++){

const angle = h/24*360;

const outer = polar(50,50,47,angle);
const inner = polar(50,50,h%2===0 ? 42 : 44,angle);

const line = document.createElementNS('http://www.w3.org/2000/svg','line');

line.setAttribute('x1',outer.x);
line.setAttribute('y1',outer.y);
line.setAttribute('x2',inner.x);
line.setAttribute('y2',inner.y);
line.setAttribute('stroke','#333');
line.setAttribute('stroke-width',h%2===0 ? '0.5':'0.2');

wrap.appendChild(line);

if(h%2===0){

const txtPos = polar(50,50,49,angle);

const text = document.createElementNS('http://www.w3.org/2000/svg','text');

text.setAttribute('x',txtPos.x);
text.setAttribute('y',txtPos.y);
text.setAttribute('text-anchor','middle');
text.setAttribute('dominant-baseline','middle');
text.setAttribute('class','hour-label');

text.textContent = h;

wrap.appendChild(text);

}

}

}

function renderArcs(){

const wrap = document.getElementById('arcs');

let total = 0;

routines.forEach(r=>{

const start = timeToMinutes(r.start);
const end = timeToMinutes(r.end);

total += (end-start);

const path = document.createElementNS('http://www.w3.org/2000/svg','path');

path.setAttribute('d',describeArc(start,end));
path.setAttribute('fill',r.color);

wrap.appendChild(path);

const mid = (start+end)/2;
const pos = polar(50,50,30,mid/1440*360);

const text = document.createElementNS('http://www.w3.org/2000/svg','text');

text.setAttribute('x',pos.x);
text.setAttribute('y',pos.y);
text.setAttribute('text-anchor','middle');
text.setAttribute('dominant-baseline','middle');
text.setAttribute('class','time-label');

text.textContent = r.subject;

wrap.appendChild(text);

});

const h = Math.floor(total/60);
const m = total%60;

document.getElementById('totalStudy').innerText =
`${h}H ${m}M`;

const focus = Math.round((total/goalStudyMinutes)*100);

document.getElementById('focusVal').innerText = focus + '%';

}

function renderList(){

const list = document.getElementById('routineList');

routines.forEach(r=>{

list.innerHTML += `
<div class="item">

<div class="left">
<div class="dot" style="background:${r.color}"></div>

<div>
<div class="subject">${r.subject}</div>
<div class="time">${r.start} - ${r.end}</div>
</div>

</div>

<div>⋯</div>

</div>
`;

});

}

function updateClock(){

const now = new Date();

const h = String(now.getHours()).padStart(2,'0');
const m = String(now.getMinutes()).padStart(2,'0');

document.getElementById('clock').innerText = `${h}:${m}`;

const minute = now.getHours()*60 + now.getMinutes();

const deg = minute/1440*360;

document.getElementById('needle')
.setAttribute(
'transform',
`rotate(${deg} 50 50)`
);

}

renderTicks();
renderArcs();
renderList();
updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
