<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'll WIN Planner Beta Calendar+</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.app{
max-width:430px;
margin:auto;
padding:20px;
padding-bottom:120px;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.logo{
font-size:28px;
font-weight:800;
font-style:italic;
}
.date-box{
font-size:13px;
color:#999;
}
.card{
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:24px;
padding:18px;
margin-bottom:18px;
}
.top-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:18px;
}
.mini{
background:#111;
border-radius:18px;
padding:16px;
border:1px solid #222;
cursor:pointer;
}
.mini-title{
font-size:11px;
color:#777;
margin-bottom:6px;
}
.mini-value{
font-size:22px;
font-weight:700;
}
.mini-sub{
font-size:11px;
color:#888;
margin-top:4px;
}
.circle-wrap{
position:relative;
aspect-ratio:1;
}
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
.total{
font-size:34px;
font-weight:700;
}
.sub{
font-size:11px;
color:#777;
margin-top:4px;
}
.current{
margin-top:10px;
font-size:13px;
color:#79dfff;
}
svg{
width:100%;
height:100%;
}
.hour{
fill:#666;
font-size:3px;
}
.arc{
transition:.25s;
cursor:pointer;
filter:drop-shadow(0 0 8px rgba(255,255,255,.08));
}
.arc.active{
transform:scale(1.03);
transform-origin:center;
filter:drop-shadow(0 0 14px rgba(255,255,255,.3));
}
.routine-label{
fill:#fff;
font-size:2.6px;
}
.needle{
stroke:#fff;
stroke-width:.45;
filter:drop-shadow(0 0 6px #fff);
}
.list-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #181818;
cursor:pointer;
}
.left{
display:flex;
align-items:center;
gap:10px;
}
.dot{
width:12px;
height:12px;
border-radius:50%;
}
.subject{
font-size:14px;
font-weight:600;
}
.time{
font-size:11px;
color:#888;
margin-top:4px;
}
button{
width:100%;
height:48px;
border:none;
border-radius:16px;
background:#fff;
color:#000;
font-weight:700;
margin-top:14px;
}
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:12px;
}
.day{
aspect-ratio:1;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:10px;
cursor:pointer;
}
.day-study{
font-size:7px;
margin-top:3px;
}
.selected{
outline:2px solid #79dfff;
}

.today{
background:#79dfff !important;
color:#000;
font-weight:700;
}

.modal-bg{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:999;
}
.modal{
background:#111;
width:86%;
max-width:340px;
padding:22px;
border-radius:24px;
border:1px solid #222;
}
.modal input{
width:100%;
height:46px;
background:#000;
border:1px solid #333;
color:#fff;
border-radius:12px;
padding:0 12px;
box-sizing:border-box;
margin-bottom:10px;
}
.review{
width:100%;
min-height:110px;
background:#0d0d0d;
border:none;
color:#fff;
resize:none;
outline:none;
font-size:14px;
}
.category-item{
display:flex;
align-items:center;
gap:10px;
padding:10px 12px;
background:#0c0c0c;
border:1px solid #222;
border-radius:14px;
margin-bottom:8px;
cursor:pointer;
}
.category-item.active{
border-color:#79dfff;
}
.category-dot{
width:12px;
height:12px;
border-radius:50%;
}
.delete-btn{
background:#ffb4b4;
margin-top:8px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">I'll WIN</div>
<div class="date-box" id="todayText"></div>
</div>

<div class="top-grid">

<div class="mini" onclick="openDDayModal()">
<div class="mini-title">D-DAY</div>
<div class="mini-value" id="ddayValue">D-DAY</div>
<div class="mini-sub" id="ddayLabel">목표 없음</div>
</div>

<div class="mini" onclick="openGoalModal()">
<div class="mini-title">GOAL RATE</div>
<div class="mini-value" id="goalRate">0%</div>
<div class="mini-sub" id="goalMinuteText">목표 8H</div>
</div>

</div>

<div class="card">

<div class="circle-wrap">

<div class="center">
<div class="total" id="totalStudy">0H 0M</div>
<div class="sub">TODAY STUDY</div>
<div class="current" id="currentRoutine">현재 루틴 없음</div>
</div>

<svg viewBox="0 0 100 100">

<circle cx="50" cy="50" r="38" fill="none" stroke="#141414" stroke-width="18"></circle>

<g id="ticks"></g>
<g id="arcs"></g>

<line id="needle" x1="50" y1="50" x2="50" y2="10" class="needle"></line>

</svg>

</div>

<div id="routineList"></div>

<button onclick="openRoutineModal()">+ 루틴 추가</button>

</div>

<div class="card">

<div style="font-size:12px;color:#888;">MONTH CALENDAR</div>

<div class="calendar" id="calendar"></div>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:10px;">DAILY REVIEW</div>

<textarea class="review" id="review"></textarea>

</div>

</div>

<div class="modal-bg" id="routineModal">
<div class="modal">

<input id="subject" placeholder="과목">

<input id="startInput" placeholder="시작시간 (730 → 07:30)">

<input id="endInput" placeholder="종료시간 (1830 → 18:30)">


<div id="categoryWrap"></div>

<div style="margin-top:12px;font-size:11px;color:#888;">카테고리 관리</div>

<div style="display:flex;gap:8px;margin-top:8px;">
<input id="newCategoryName" placeholder="카테고리명"
style="flex:1;height:42px;background:#000;border:1px solid #333;color:#fff;border-radius:12px;padding:0 10px;">

<input type="color" id="newCategoryColor"
value="#79dfff"
style="width:52px;height:42px;padding:0;border:none;background:none;">
</div>

<button onclick="addCategory()" style="height:42px;margin-top:8px;">
+ 카테고리 추가
</button>


<button onclick="saveRoutine()">저장</button>

<button class="delete-btn" id="deleteRoutineBtn" onclick="deleteRoutine()">삭제</button>

<button onclick="closeModal('routineModal')" style="background:#222;color:#fff;">닫기</button>

</div>
</div>

<div class="modal-bg" id="goalModal">
<div class="modal">

<input id="goalInput" placeholder="일일 목표 공부시간 (분)">

<button onclick="saveGoal()">저장</button>

<button onclick="closeModal('goalModal')" style="background:#222;color:#fff;">닫기</button>

</div>
</div>

<div class="modal-bg" id="ddayModal">
<div class="modal">

<input id="ddayTitle" placeholder="디데이 이름">

<input type="date" id="ddayDate">

<button onclick="saveDDay()">저장</button>

<button onclick="deleteDDay()" class="delete-btn">삭제</button>

<button onclick="closeModal('ddayModal')" style="background:#222;color:#fff;">닫기</button>

</div>
</div>

<script>

let selectedDate = new Date().toISOString().split('T')[0];
let editIndex = -1;
let selectedCategory = 0;

let categories = JSON.parse(localStorage.getItem('planner_categories') || 'null') || [
{name:'헌법',color:'#79dfff'},
{name:'행정학',color:'#60a5fa'},
{name:'경제학',color:'#c084fc'},
{name:'PSAT',color:'#34d399'}
];

let db = JSON.parse(localStorage.getItem('planner_beta_calendar_plus') || '{}');

if(!db.settings){
db.settings = {
goalMinutes:480,
ddayTitle:'',
ddayDate:''
};
}

function currentData(){

if(!db[selectedDate]){
db[selectedDate] = {
routines:[],
review:''
};
}

return db[selectedDate];

}

function formatTime(v){

v = v.replace(/[^0-9]/g,'');

if(v.length===3){
v='0'+v;
}

if(v.length===4){
return v.slice(0,2)+':'+v.slice(2);
}

return v;

}

function timeToMin(t){
const [h,m] = t.split(':').map(Number);
return h*60+m;
}

function polar(cx,cy,r,deg){
const rad=(deg-90)*Math.PI/180;
return {
x:cx+r*Math.cos(rad),
y:cy+r*Math.sin(rad)
};
}

function arcPath(start,end){

const sa=start/1440*360;
const ea=end/1440*360;

const s=polar(50,50,38,sa);
const e=polar(50,50,38,ea);

const large=ea-sa<=180?0:1;

return `
M 50 50
L ${s.x} ${s.y}
A 38 38 0 ${large} 1 ${e.x} ${e.y}
Z
`;

}

function renderTicks(){

const wrap=document.getElementById('ticks');

for(let h=0;h<24;h++){

const angle=h/24*360;

const outer=polar(50,50,47,angle);
const inner=polar(50,50,h%2===0?42:44,angle);

const line=document.createElementNS('http://www.w3.org/2000/svg','line');

line.setAttribute('x1',outer.x);
line.setAttribute('y1',outer.y);
line.setAttribute('x2',inner.x);
line.setAttribute('y2',inner.y);
line.setAttribute('stroke','#333');

wrap.appendChild(line);

if(h%2===0){

const pos=polar(50,50,49,angle);

const text=document.createElementNS('http://www.w3.org/2000/svg','text');

text.setAttribute('x',pos.x);
text.setAttribute('y',pos.y);
text.setAttribute('class','hour');

text.textContent=h;

wrap.appendChild(text);

}

}

}

function renderPlanner(){

const data=currentData();

const arcs=document.getElementById('arcs');
const list=document.getElementById('routineList');

arcs.innerHTML='';
list.innerHTML='';

let total=0;

const nowMin=new Date().getHours()*60+new Date().getMinutes();

data.routines.forEach((r,idx)=>{

const start=timeToMin(r.start);
const end=timeToMin(r.end);

total += (end-start);

const path=document.createElementNS('http://www.w3.org/2000/svg','path');

path.setAttribute('d',arcPath(start,end));
path.setAttribute('fill',r.color);
path.setAttribute('class','arc');

if(nowMin>=start && nowMin<end){
path.classList.add('active');
document.getElementById('currentRoutine').innerText=r.subject;
}

arcs.appendChild(path);

const mid=(start+end)/2;
const pos=polar(50,50,28,mid/1440*360);

const text=document.createElementNS('http://www.w3.org/2000/svg','text');

text.setAttribute('x',pos.x);
text.setAttribute('y',pos.y);
text.setAttribute('class','routine-label');

text.textContent=r.subject;

arcs.appendChild(text);

list.innerHTML += `
<div class="list-item" onclick="editRoutine(${idx})">
<div class="left">
<div class="dot" style="background:${r.color}"></div>
<div>
<div class="subject">${r.subject}</div>
<div class="time">${r.start} - ${r.end}</div>
</div>
</div>
<div style="color:${r.color};font-size:12px;">${r.category}</div>
</div>
`;

});

document.getElementById('totalStudy').innerText =
`${Math.floor(total/60)}H ${total%60}M`;

document.getElementById('goalRate').innerText =
Math.round((total/db.settings.goalMinutes)*100)+'%';

document.getElementById('goalMinuteText').innerText =
`목표 ${Math.floor(db.settings.goalMinutes/60)}H`;

document.getElementById('review').value = data.review || '';

renderDDay();

}

function renderDDay(){

if(!db.settings.ddayDate){
document.getElementById('ddayValue').innerText='D-DAY';
document.getElementById('ddayLabel').innerText='목표 없음';
return;
}

const diff=Math.ceil(
(new Date(db.settings.ddayDate)-new Date())/(1000*60*60*24)
);

document.getElementById('ddayValue').innerText='D-'+diff;
document.getElementById('ddayLabel').innerText=db.settings.ddayTitle;

}

function renderCalendar(){

const cal=document.getElementById('calendar');
cal.innerHTML='';

const now=new Date(selectedDate);

const y=now.getFullYear();
const m=now.getMonth();

const last=new Date(y,m+1,0).getDate();

for(let d=1;d<=last;d++){

const dateKey=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const study=(db[dateKey]?.routines || []).reduce((a,b)=>{
return a + (timeToMin(b.end)-timeToMin(b.start));
},0);

const hour=Math.floor(study/60);

let bg='#111';

if(hour>=8) bg='#5de0ff';
else if(hour>=5) bg='#1d4ed8';
else if(hour>=2) bg='#1e293b';

cal.innerHTML += `
<div class="day ${dateKey===selectedDate ? 'selected':''} ${dateKey===new Date().toISOString().split('T')[0] ? 'today' : ''}"
style="background:${bg}"
onclick="changeDate('${dateKey}')">

<div>${d}</div>
<div class="day-study">${hour}H</div>

</div>
`;

}

}

function changeDate(d){

selectedDate=d;

document.getElementById('todayText').innerText=selectedDate;

renderPlanner();
renderCalendar();

}

function renderCategories(){

const wrap=document.getElementById('categoryWrap');

wrap.innerHTML='';

categories.forEach((c,idx)=>{

wrap.innerHTML += `
<div class="category-item ${selectedCategory===idx ? 'active':''}"
onclick="selectCategory(${idx})">

<div class="category-dot" style="background:${c.color}"></div>

<div>${c.name}</div>


<div style="margin-left:auto;display:flex;gap:6px;">

<div onclick="event.stopPropagation();moveCategory(${idx},-1)"
style="font-size:12px;color:#888;">↑</div>

<div onclick="event.stopPropagation();moveCategory(${idx},1)"
style="font-size:12px;color:#888;">↓</div>

<div onclick="event.stopPropagation();deleteCategory(${idx})"
style="font-size:12px;color:#ff8b8b;">✕</div>

</div>

</div>
`;

});

}



function saveCategories(){
localStorage.setItem('planner_categories',JSON.stringify(categories));
}

function addCategory(){

const name=document.getElementById('newCategoryName').value.trim();
const color=document.getElementById('newCategoryColor').value;

if(!name) return alert('카테고리명을 입력하세요.');

categories.push({
name,color
});

saveCategories();

document.getElementById('newCategoryName').value='';

renderCategories();

}

function deleteCategory(idx){

if(categories.length<=1){
alert('최소 1개 카테고리가 필요합니다.');
return;
}

const removed = categories[idx];

categories.splice(idx,1);

Object.keys(db).forEach(key=>{

if(!db[key]?.routines) return;

db[key].routines.forEach(r=>{

if(r.category===removed.name){
r.category=categories[0].name;
r.color=categories[0].color;
}

});

});

saveCategories();
saveDB();

if(selectedCategory>=categories.length){
selectedCategory=0;
}

renderCategories();
renderPlanner();

}

function moveCategory(idx,dir){

const target = idx + dir;

if(target<0 || target>=categories.length) return;

[categories[idx],categories[target]] =
[categories[target],categories[idx]];

saveCategories();

renderCategories();

}


function selectCategory(idx){

selectedCategory=idx;

renderCategories();

}

function openRoutineModal(){

editIndex=-1;

document.getElementById('routineModal').style.display='flex';

document.getElementById('deleteRoutineBtn').style.display='none';

document.getElementById('subject').value='';
document.getElementById('startInput').value='';
document.getElementById('endInput').value='';

selectedCategory=0;

renderCategories();

}

function editRoutine(idx){

editIndex=idx;

const r=currentData().routines[idx];

document.getElementById('routineModal').style.display='flex';

document.getElementById('deleteRoutineBtn').style.display='block';

document.getElementById('subject').value=r.subject;
document.getElementById('startInput').value=r.start;
document.getElementById('endInput').value=r.end;

selectedCategory=categories.findIndex(v=>v.name===r.category);

if(selectedCategory<0) selectedCategory=0;

renderCategories();

}

function saveRoutine(){

const data=currentData();

const category=categories[selectedCategory];

const obj={
subject:document.getElementById('subject').value,
start:formatTime(document.getElementById('startInput').value),
end:formatTime(document.getElementById('endInput').value),
color:category.color,
category:category.name
};

if(editIndex>-1){
data.routines[editIndex]=obj;
}else{
data.routines.push(obj);
}

saveDB();

closeModal('routineModal');

renderPlanner();
renderCalendar();

}

function deleteRoutine(){

currentData().routines.splice(editIndex,1);

saveDB();

closeModal('routineModal');

renderPlanner();
renderCalendar();

}

function openGoalModal(){

document.getElementById('goalModal').style.display='flex';

document.getElementById('goalInput').value =
db.settings.goalMinutes;

}

function saveGoal(){

db.settings.goalMinutes =
Number(document.getElementById('goalInput').value);

saveDB();

closeModal('goalModal');

renderPlanner();

}

function openDDayModal(){

document.getElementById('ddayModal').style.display='flex';

document.getElementById('ddayTitle').value =
db.settings.ddayTitle || '';

document.getElementById('ddayDate').value =
db.settings.ddayDate || '';

}

function saveDDay(){

db.settings.ddayTitle =
document.getElementById('ddayTitle').value;

db.settings.ddayDate =
document.getElementById('ddayDate').value;

saveDB();

closeModal('ddayModal');

renderDDay();

}

function deleteDDay(){

db.settings.ddayTitle='';
db.settings.ddayDate='';

saveDB();

closeModal('ddayModal');

renderDDay();

}

function closeModal(id){
document.getElementById(id).style.display='none';
}

function saveDB(){
localStorage.setItem('planner_beta_calendar_plus',JSON.stringify(db));
}

document.getElementById('review').addEventListener('input',e=>{

e.target.style.height='auto';
e.target.style.height=e.target.scrollHeight+'px';

currentData().review=e.target.value;

saveDB();

});

function updateNeedle(){

const now=new Date();

const min=now.getHours()*60+now.getMinutes();

const deg=min/1440*360;

document.getElementById('needle')
.setAttribute('transform',`rotate(${deg} 50 50)`);

}

document.getElementById('todayText').innerText=selectedDate;

renderTicks();
renderPlanner();
renderCalendar();
updateNeedle();

setInterval(updateNeedle,60000);

</script>

</body>
</html>
