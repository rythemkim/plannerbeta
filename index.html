<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'll WIN CYBER BLACK</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow-x:hidden;
}
.app{
max-width:430px;
margin:auto;
padding:20px;
padding-bottom:100px;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
.logo{
font-size:28px;
font-weight:800;
font-style:italic;
letter-spacing:-1px;
}
.card{
background:#0a0a0a;
border:1px solid #1f1f1f;
border-radius:26px;
padding:20px;
margin-bottom:18px;
box-shadow:0 0 30px rgba(255,255,255,.03);
}
.top-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}
.top-box{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:16px;
}
.top-title{
font-size:11px;
color:#888;
margin-bottom:6px;
}
.top-value{
font-size:24px;
font-weight:700;
}
.circle-wrap{
position:relative;
aspect-ratio:1;
}
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}
.total{
font-size:34px;
font-weight:700;
}
.total-sub{
font-size:12px;
color:#777;
margin-top:5px;
}
.current-routine{
margin-top:12px;
font-size:13px;
color:#9ee7ff;
}
svg{
width:100%;
height:100%;
}
.hour-label{
fill:#666;
font-size:3.4px;
}
.routine-label{
fill:#fff;
font-size:2.8px;
pointer-events:none;
}
.needle{
stroke:#fff;
stroke-width:.45;
filter:drop-shadow(0 0 4px #fff);
transition:transform 1s linear;
}
.arc{
cursor:pointer;
transition:.25s;
filter:drop-shadow(0 0 8px rgba(255,255,255,.08));
}
.arc.active{
transform:scale(1.03);
transform-origin:center;
filter:drop-shadow(0 0 14px rgba(255,255,255,.35));
}
.list{
margin-top:16px;
}
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #181818;
cursor:pointer;
}
.left{
display:flex;
align-items:center;
gap:10px;
}
.dot{
width:12px;
height:12px;
border-radius:50%;
box-shadow:0 0 10px currentColor;
}
.subject{
font-size:14px;
font-weight:600;
}
.time{
font-size:11px;
color:#888;
margin-top:3px;
}
button{
width:100%;
height:48px;
border:none;
border-radius:16px;
background:#fff;
color:#000;
font-weight:700;
margin-top:14px;
}
.quick{
display:flex;
gap:8px;
margin-top:12px;
overflow:auto;
}
.quick-btn{
padding:8px 12px;
border-radius:999px;
background:#151515;
border:1px solid #222;
white-space:nowrap;
font-size:12px;
}
.week-row{
margin-top:12px;
}
.bar{
height:10px;
background:#171717;
border-radius:999px;
overflow:hidden;
}
.fill{
height:100%;
background:linear-gradient(90deg,#5de0ff,#fff);
}
.week-label{
display:flex;
justify-content:space-between;
margin-top:5px;
font-size:11px;
color:#888;
}
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:12px;
}
.day{
aspect-ratio:1;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:10px;
}
.day-study{
font-size:7px;
margin-top:3px;
}
.review{
width:100%;
min-height:110px;
background:#0e0e0e;
border:none;
outline:none;
resize:none;
color:#fff;
font-size:14px;
}
.modal-bg{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:999;
}
.modal{
background:#101010;
width:86%;
max-width:340px;
padding:22px;
border-radius:24px;
border:1px solid #222;
}
.modal input,.modal select{
width:100%;
height:46px;
margin-bottom:10px;
background:#000;
color:#fff;
border:1px solid #333;
border-radius:12px;
padding:0 12px;
box-sizing:border-box;
}
.small{
font-size:11px;
color:#666;
margin-top:8px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">I'll WIN</div>
<div id="clock"></div>
</div>

<div class="top-grid">

<div class="top-box">
<div class="top-title">D-DAY</div>
<div class="top-value" id="dday">D-0</div>
</div>

<div class="top-box">
<div class="top-title">GOAL RATE</div>
<div class="top-value" id="focus">0%</div>
</div>

</div>

<div class="card">

<div class="circle-wrap">

<div class="center">
<div class="total" id="todayTotal">0H 0M</div>
<div class="total-sub">TODAY STUDY</div>
<div class="current-routine" id="currentRoutine">현재 루틴 없음</div>
</div>

<svg viewBox="0 0 100 100">

<circle cx="50" cy="50" r="38" fill="none" stroke="#121212" stroke-width="18"></circle>

<g id="ticks"></g>
<g id="arcs"></g>

<line id="needle" x1="50" y1="50" x2="50" y2="10" class="needle"></line>

</svg>

</div>

<div class="list" id="routineList"></div>

<button onclick="openModal()">+ 루틴 추가</button>

<div class="quick" id="recentWrap"></div>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:10px;">WEEKLY STUDY</div>

<div id="weekly"></div>

</div>

<div class="card">

<div style="font-size:12px;color:#888;">MONTHLY CALENDAR</div>
<div id="monthAvg" style="margin-top:8px;font-size:14px;color:#aaa;"></div>

<div class="calendar" id="calendar"></div>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:10px;">TODAY GOAL</div>

<input id="goalInput" placeholder="오늘 목표 입력"
style="width:100%;height:46px;background:#000;color:#fff;border:1px solid #222;border-radius:14px;padding:0 12px;box-sizing:border-box;">

<div class="small" id="goalText"></div>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:10px;">DAILY REVIEW</div>

<textarea class="review" id="review"></textarea>

</div>

</div>

<div class="modal-bg" id="modalBg">
<div class="modal">

<input id="subject" placeholder="과목">

<input type="time" step="600" id="start">

<input type="time" step="600" id="end">

<input type="color" id="color" value="#7dd3fc">

<select id="category">
<option>헌법</option>
<option>행정학</option>
<option>경제학</option>
<option>PSAT</option>
</select>

<button onclick="saveRoutine()">저장</button>

<button id="deleteBtn" onclick="deleteRoutine()" style="background:#ffb6b6;margin-top:8px;">삭제</button>

<button onclick="closeModal()" style="background:#1f1f1f;color:#fff;margin-top:8px;">닫기</button>

</div>
</div>

<script>

let routines = JSON.parse(localStorage.getItem('cyber_routines') || '[]');
let recent = JSON.parse(localStorage.getItem('recent_routines') || '[]');
let editIndex = -1;

const goalMinutes = 480;

function timeToMin(t){
const [h,m]=t.split(':').map(Number);
return h*60+m;
}

function polar(cx,cy,r,deg){
const rad=(deg-90)*Math.PI/180;
return {
x:cx+r*Math.cos(rad),
y:cy+r*Math.sin(rad)
};
}

function arcPath(start,end){

const sa=start/1440*360;
const ea=end/1440*360;

const s=polar(50,50,38,sa);
const e=polar(50,50,38,ea);

const large=ea-sa<=180?0:1;

return `
M 50 50
L ${s.x} ${s.y}
A 38 38 0 ${large} 1 ${e.x} ${e.y}
Z
`;
}

function renderTicks(){

const wrap=document.getElementById('ticks');

for(let h=0;h<24;h++){

const angle=h/24*360;

const outer=polar(50,50,47,angle);
const inner=polar(50,50,h%2===0?42:44,angle);

const line=document.createElementNS('http://www.w3.org/2000/svg','line');

line.setAttribute('x1',outer.x);
line.setAttribute('y1',outer.y);
line.setAttribute('x2',inner.x);
line.setAttribute('y2',inner.y);
line.setAttribute('stroke','#333');

wrap.appendChild(line);

if(h%2===0){

const pos=polar(50,50,49,angle);

const text=document.createElementNS('http://www.w3.org/2000/svg','text');

text.setAttribute('x',pos.x);
text.setAttribute('y',pos.y);
text.setAttribute('text-anchor','middle');
text.setAttribute('dominant-baseline','middle');
text.setAttribute('class','hour-label');

text.textContent=h;

wrap.appendChild(text);

}

}

}

function renderRoutines(){

const arcs=document.getElementById('arcs');
const list=document.getElementById('routineList');

arcs.innerHTML='';
list.innerHTML='';

let total=0;

const nowMin=new Date().getHours()*60+new Date().getMinutes();

routines.forEach((r,i)=>{

const start=timeToMin(r.start);
const end=timeToMin(r.end);

total += (end-start);

const path=document.createElementNS('http://www.w3.org/2000/svg','path');

path.setAttribute('d',arcPath(start,end));
path.setAttribute('fill',r.color);
path.setAttribute('class','arc');

if(nowMin>=start && nowMin<end){
path.classList.add('active');
document.getElementById('currentRoutine').innerText = r.subject;
}

path.onclick=()=>editRoutine(i);

arcs.appendChild(path);

const mid=(start+end)/2;

const pos=polar(50,50,28,mid/1440*360);

const text=document.createElementNS('http://www.w3.org/2000/svg','text');

text.setAttribute('x',pos.x);
text.setAttribute('y',pos.y);
text.setAttribute('text-anchor','middle');
text.setAttribute('dominant-baseline','middle');
text.setAttribute('class','routine-label');

text.textContent=r.subject;

arcs.appendChild(text);

list.innerHTML += `
<div class="item" onclick="editRoutine(${i})">

<div class="left">

<div class="dot" style="background:${r.color};color:${r.color};"></div>

<div>
<div class="subject">${r.subject}</div>
<div class="time">${r.start} - ${r.end}</div>
</div>

</div>

<div>⋯</div>

</div>
`;

});

document.getElementById('todayTotal').innerText =
`${Math.floor(total/60)}H ${total%60}M`;

document.getElementById('focus').innerText =
Math.round((total/goalMinutes)*100)+'%';

}

function renderRecent(){

const wrap=document.getElementById('recentWrap');

wrap.innerHTML='';

recent.slice(-5).reverse().forEach(v=>{

wrap.innerHTML += `
<div class="quick-btn" onclick="quickFill('${v}')">${v}</div>
`;

});

}

function quickFill(v){
document.getElementById('subject').value=v;
}

function openModal(){

editIndex=-1;

document.getElementById('modalBg').style.display='flex';

document.getElementById('deleteBtn').style.display='none';

document.getElementById('subject').value='';
document.getElementById('start').value='';
document.getElementById('end').value='';

}

function editRoutine(i){

editIndex=i;

const r=routines[i];

document.getElementById('modalBg').style.display='flex';

document.getElementById('deleteBtn').style.display='block';

document.getElementById('subject').value=r.subject;
document.getElementById('start').value=r.start;
document.getElementById('end').value=r.end;
document.getElementById('color').value=r.color;

}

function saveRoutine(){

const subject=document.getElementById('subject').value;
const start=document.getElementById('start').value;
const end=document.getElementById('end').value;
const color=document.getElementById('color').value;

const startMin=timeToMin(start);
const endMin=timeToMin(end);

const overlap=routines.some((r,idx)=>{

if(idx===editIndex) return false;

const s=timeToMin(r.start);
const e=timeToMin(r.end);

return startMin<e && endMin>s;

});

if(overlap){
alert('같은 시간대 루틴이 존재합니다.');
return;
}

const obj={subject,start,end,color};

if(editIndex>-1){
routines[editIndex]=obj;
}else{
routines.push(obj);
}

if(!recent.includes(subject)){
recent.push(subject);
}

localStorage.setItem('cyber_routines',JSON.stringify(routines));
localStorage.setItem('recent_routines',JSON.stringify(recent));

closeModal();

renderRoutines();
renderRecent();

}

function deleteRoutine(){

routines.splice(editIndex,1);

localStorage.setItem('cyber_routines',JSON.stringify(routines));

closeModal();

renderRoutines();

}

function closeModal(){
document.getElementById('modalBg').style.display='none';
}

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,'0');
const m=String(now.getMinutes()).padStart(2,'0');

document.getElementById('clock').innerText=`${h}:${m}`;

const minute=now.getHours()*60+now.getMinutes();

const deg=minute/1440*360;

document.getElementById('needle')
.setAttribute('transform',`rotate(${deg} 50 50)`);

}

function renderWeekly(){

const weekly=document.getElementById('weekly');

const sample=[430,380,520,310,460,620,500];

sample.forEach((v,i)=>{

const days=['MON','TUE','WED','THU','FRI','SAT','SUN'];

weekly.innerHTML += `
<div class="week-row">

<div class="bar">
<div class="fill" style="width:${Math.min(v/6,100)}%"></div>
</div>

<div class="week-label">
<span>${days[i]}</span>
<span>${Math.floor(v/60)}H ${v%60}M</span>
</div>

</div>
`;

});

}

function getColor(hour){

if(hour>=8) return '#5de0ff';
if(hour>=6) return '#2f6cff';
if(hour>=3) return '#1c1c1c';

return '#111';

}

function renderCalendar(){

const cal=document.getElementById('calendar');

const now=new Date();

const y=now.getFullYear();
const m=now.getMonth();

const last=new Date(y,m+1,0).getDate();

let total=0;

for(let d=1;d<=last;d++){

const hour=Math.floor(Math.random()*10);

total += hour;

cal.innerHTML += `
<div class="day" style="background:${getColor(hour)}">

<div>${d}</div>

<div class="day-study">
${hour}H
</div>

</div>
`;

}

document.getElementById('monthAvg').innerText =
`월 평균 ${(total/last).toFixed(1)}H`;

}

function updateDDay(){

const target=localStorage.getItem('dday');

if(!target){
document.getElementById('dday').innerText='D-DAY';
return;
}

const diff=Math.ceil(
(new Date(target)-new Date())/(1000*60*60*24)
);

document.getElementById('dday').innerText='D-'+diff;

}

document.getElementById('goalInput').addEventListener('input',e=>{

localStorage.setItem('goal_text',e.target.value);

document.getElementById('goalText').innerText=e.target.value;

});

document.getElementById('review').addEventListener('input',e=>{

e.target.style.height='auto';
e.target.style.height=e.target.scrollHeight+'px';

localStorage.setItem('review_text',e.target.value);

});

renderTicks();
renderRoutines();
renderRecent();
renderWeekly();
renderCalendar();
updateClock();
updateDDay();

document.getElementById('goalInput').value =
localStorage.getItem('goal_text') || '';

document.getElementById('goalText').innerText =
localStorage.getItem('goal_text') || '';

document.getElementById('review').value =
localStorage.getItem('review_text') || '';

setInterval(()=>{
updateClock();
renderRoutines();
},60000);

</script>

</body>
</html>
