<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'll WIN Planner Beta+</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
.app{max-width:430px;margin:auto;padding:20px;padding-bottom:120px;}
.card{background:#0b0b0b;border:1px solid #1f1f1f;border-radius:24px;padding:18px;margin-bottom:18px;}
.logo{font-size:28px;font-weight:800;font-style:italic;margin-bottom:20px;}
.top{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.box{background:#111;border-radius:18px;padding:16px;}
.label{font-size:11px;color:#777;margin-bottom:6px;}
.value{font-size:24px;font-weight:700;}
button{width:100%;height:46px;border:none;border-radius:14px;background:#fff;color:#000;font-weight:700;margin-top:10px;}
.small-btn{height:38px;background:#1d1d1d;color:#fff;}
.list-item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #181818;cursor:pointer;}
.review{width:100%;min-height:100px;background:#0d0d0d;border:none;color:#fff;font-size:14px;outline:none;resize:none;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;}
.modal{background:#111;width:86%;max-width:340px;padding:22px;border-radius:24px;border:1px solid #222;}
.modal input{width:100%;height:46px;margin-bottom:10px;background:#000;color:#fff;border:1px solid #333;border-radius:12px;padding:0 12px;box-sizing:border-box;}
.delete{background:#ffb4b4 !important;}
</style>
</head>
<body>

<div class="app">

<div class="logo">I'll WIN</div>

<div class="top">

<div class="box">
<div class="label">D-DAY</div>
<div class="value" id="ddayText">D-DAY</div>
<button class="small-btn" onclick="openDDayModal()">수정</button>
</div>

<div class="box">
<div class="label">GOAL</div>
<div class="value" id="goalRate">0%</div>
<button class="small-btn" onclick="openGoalModal()">목표 설정</button>
</div>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:12px;">ROUTINES</div>

<div id="routineList"></div>

<button onclick="openRoutineModal()">+ 루틴 추가</button>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:12px;">DAILY REVIEW</div>

<textarea class="review" id="review"></textarea>

</div>

</div>

<div class="modal-bg" id="routineModal">
<div class="modal">

<input id="subject" placeholder="과목">
<input id="start" placeholder="730 → 07:30">
<input id="end" placeholder="1830 → 18:30">
<input type="color" id="color" value="#79dfff">

<button onclick="saveRoutine()">저장</button>
<button class="delete" id="routineDeleteBtn" onclick="deleteRoutine()">삭제</button>
<button class="small-btn" onclick="closeModal('routineModal')">닫기</button>

</div>
</div>

<div class="modal-bg" id="goalModal">
<div class="modal">

<input id="goalMinuteInput" placeholder="목표 공부시간(분)">

<button onclick="saveGoal()">저장</button>
<button class="small-btn" onclick="closeModal('goalModal')">닫기</button>

</div>
</div>

<div class="modal-bg" id="ddayModal">
<div class="modal">

<input type="date" id="ddayInput">

<button onclick="saveDDay()">저장</button>
<button class="delete" onclick="deleteDDay()">삭제</button>
<button class="small-btn" onclick="closeModal('ddayModal')">닫기</button>

</div>
</div>

<script>

let editIndex=-1;

let db=JSON.parse(localStorage.getItem('planner_plus_db')||'{}');

if(!db.routines) db.routines=[];
if(!db.goalMinutes) db.goalMinutes=480;

function formatTime(v){

v=v.replace(/[^0-9]/g,'');

if(v.length===3) v='0'+v;

if(v.length===4){
return v.slice(0,2)+':'+v.slice(2);
}

return v;

}

function timeToMin(t){
const [h,m]=t.split(':').map(Number);
return h*60+m;
}

function render(){

const list=document.getElementById('routineList');

list.innerHTML='';

let total=0;

db.routines.forEach((r,i)=>{

total += timeToMin(r.end)-timeToMin(r.start);

list.innerHTML += `
<div class="list-item" onclick="editRoutine(${i})">

<div>
<div style="font-weight:600;">${r.subject}</div>
<div style="font-size:11px;color:#888;margin-top:4px;">
${r.start} - ${r.end}
</div>
</div>

<div style="width:12px;height:12px;border-radius:50%;background:${r.color};"></div>

</div>
`;

});

document.getElementById('goalRate').innerText =
Math.round((total/db.goalMinutes)*100)+'%';

updateDDay();

}

function openRoutineModal(){

editIndex=-1;

document.getElementById('routineModal').style.display='flex';

document.getElementById('routineDeleteBtn').style.display='none';

document.getElementById('subject').value='';
document.getElementById('start').value='';
document.getElementById('end').value='';

}

function editRoutine(i){

editIndex=i;

const r=db.routines[i];

document.getElementById('routineModal').style.display='flex';

document.getElementById('routineDeleteBtn').style.display='block';

document.getElementById('subject').value=r.subject;
document.getElementById('start').value=r.start;
document.getElementById('end').value=r.end;
document.getElementById('color').value=r.color;

}

function saveRoutine(){

const obj={
subject:document.getElementById('subject').value,
start:formatTime(document.getElementById('start').value),
end:formatTime(document.getElementById('end').value),
color:document.getElementById('color').value
};

if(editIndex>-1){
db.routines[editIndex]=obj;
}else{
db.routines.push(obj);
}

saveDB();

closeModal('routineModal');

render();

}

function deleteRoutine(){

db.routines.splice(editIndex,1);

saveDB();

closeModal('routineModal');

render();

}

function openGoalModal(){

document.getElementById('goalModal').style.display='flex';

document.getElementById('goalMinuteInput').value =
db.goalMinutes;

}

function saveGoal(){

db.goalMinutes =
Number(document.getElementById('goalMinuteInput').value);

saveDB();

closeModal('goalModal');

render();

}

function openDDayModal(){

document.getElementById('ddayModal').style.display='flex';

document.getElementById('ddayInput').value =
db.dday || '';

}

function saveDDay(){

db.dday=document.getElementById('ddayInput').value;

saveDB();

closeModal('ddayModal');

updateDDay();

}

function deleteDDay(){

delete db.dday;

saveDB();

closeModal('ddayModal');

updateDDay();

}

function updateDDay(){

if(!db.dday){
document.getElementById('ddayText').innerText='D-DAY';
return;
}

const diff=Math.ceil(
(new Date(db.dday)-new Date())/(1000*60*60*24)
);

document.getElementById('ddayText').innerText='D-'+diff;

}

function closeModal(id){
document.getElementById(id).style.display='none';
}

function saveDB(){
localStorage.setItem('planner_plus_db',JSON.stringify(db));
}

document.getElementById('review').addEventListener('input',e=>{

e.target.style.height='auto';
e.target.style.height=e.target.scrollHeight+'px';

db.review=e.target.value;

saveDB();

});

document.getElementById('review').value=db.review || '';

render();

</script>

</body>
</html>
