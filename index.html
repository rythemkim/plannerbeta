<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'll WIN Planner</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.app{
max-width:430px;
margin:auto;
padding:20px;
padding-bottom:120px;
}
.logo{
font-size:28px;
font-weight:800;
font-style:italic;
margin-bottom:20px;
}
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:14px;
}
.day{
aspect-ratio:1;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
background:#111;
cursor:pointer;
position:relative;
}
.today{
background:#79dfff !important;
color:#000;
font-weight:700;
}
.selected{
outline:2px solid #79dfff;
}
.card{
background:#0b0b0b;
border:1px solid #1f1f1f;
border-radius:24px;
padding:18px;
margin-bottom:18px;
}
button{
width:100%;
height:46px;
border:none;
border-radius:14px;
background:#fff;
color:#000;
font-weight:700;
margin-top:12px;
}
.list-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 0;
border-bottom:1px solid #181818;
cursor:pointer;
}
.left{
display:flex;
align-items:center;
gap:10px;
}
.dot{
width:12px;
height:12px;
border-radius:50%;
}
.modal-bg{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:999;
}
.modal{
background:#111;
width:86%;
max-width:340px;
padding:22px;
border-radius:24px;
border:1px solid #222;
max-height:85vh;
overflow:auto;
}
.modal input{
width:100%;
height:46px;
background:#000;
border:1px solid #333;
color:#fff;
border-radius:12px;
padding:0 12px;
box-sizing:border-box;
margin-bottom:10px;
}
.category-item{
display:flex;
align-items:center;
gap:10px;
padding:10px 12px;
background:#0d0d0d;
border:1px solid #222;
border-radius:14px;
margin-bottom:8px;
cursor:pointer;
}
.category-item.active{
border-color:#79dfff;
}
.category-dot{
width:12px;
height:12px;
border-radius:50%;
}
.cat-actions{
margin-left:auto;
display:flex;
gap:10px;
font-size:12px;
}
.review{
width:100%;
min-height:100px;
background:#0d0d0d;
border:none;
color:#fff;
resize:none;
outline:none;
font-size:14px;
}
</style>
</head>

<body>

<div class="app">

<div class="logo">I'll WIN</div>

<div class="card">
<div style="font-size:12px;color:#888;">MONTH CALENDAR</div>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
<div>
<div style="font-size:12px;color:#888;">D-DAY</div>
<div id="ddayText" style="font-size:22px;font-weight:700;">D-DAY</div>
<div id="ddayLabel" style="font-size:11px;color:#888;">목표 없음</div>
</div>

<div>
<div style="font-size:12px;color:#888;">GOAL RATE</div>
<div id="goalRate" style="font-size:22px;font-weight:700;">0%</div>
</div>
</div>

<button onclick="openGoalModal()">목표 설정</button>
<button onclick="openDDayModal()">디데이 설정</button>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:10px;">ROUTINES</div>

<div id="routineList"></div>

<button onclick="openRoutineModal()">+ 루틴 추가</button>

</div>

<div class="card">

<div style="font-size:12px;color:#888;margin-bottom:10px;">DAILY REVIEW</div>

<textarea id="review" class="review"></textarea>

</div>

</div>

<div class="modal-bg" id="routineModal">
<div class="modal">

<input id="subject" placeholder="과목">
<input id="startInput" placeholder="730 → 07:30">
<input id="endInput" placeholder="1830 → 18:30">

<div id="categoryWrap"></div>

<div style="font-size:11px;color:#888;margin-top:10px;">카테고리 관리</div>

<input id="newCategoryName" placeholder="카테고리명">

<input type="color" id="newCategoryColor" value="#79dfff"
style="width:100%;height:46px;padding:4px;">

<button onclick="addCategory()">+ 카테고리 추가</button>

<button onclick="saveRoutine()">저장</button>

<button onclick="deleteRoutine()" id="deleteRoutineBtn"
style="background:#ffb4b4;">삭제</button>

<button onclick="closeModal('routineModal')"
style="background:#222;color:#fff;">닫기</button>

</div>
</div>

<div class="modal-bg" id="goalModal">
<div class="modal">

<input id="goalInput" placeholder="일일 목표 공부시간(분)">

<button onclick="saveGoal()">저장</button>

<button onclick="closeModal('goalModal')"
style="background:#222;color:#fff;">닫기</button>

</div>
</div>

<div class="modal-bg" id="ddayModal">
<div class="modal">

<input id="ddayTitle" placeholder="디데이 이름">

<input type="date" id="ddayDate">

<button onclick="saveDDay()">저장</button>

<button onclick="deleteDDay()" style="background:#ffb4b4;">
삭제
</button>

<button onclick="closeModal('ddayModal')"
style="background:#222;color:#fff;">닫기</button>

</div>
</div>

<script>

let selectedDate = new Date().toISOString().split('T')[0];
let editIndex = -1;
let selectedCategory = 0;

let categories = JSON.parse(localStorage.getItem('planner_categories') || 'null') || [
{name:'헌법',color:'#79dfff'},
{name:'행정학',color:'#60a5fa'},
{name:'경제학',color:'#c084fc'},
{name:'PSAT',color:'#34d399'}
];

let db = JSON.parse(localStorage.getItem('planner_db_fixed') || '{}');

if(!db.settings){
db.settings = {
goalMinutes:480,
ddayTitle:'',
ddayDate:''
};
}

function currentData(){

if(!db[selectedDate]){
db[selectedDate] = {
routines:[],
review:''
};
}

return db[selectedDate];

}

function saveDB(){
localStorage.setItem('planner_db_fixed',JSON.stringify(db));
}

function saveCategories(){
localStorage.setItem('planner_categories',JSON.stringify(categories));
}

function formatTime(v){

v=v.replace(/[^0-9]/g,'');

if(v.length===3){
v='0'+v;
}

if(v.length===4){
return v.slice(0,2)+':'+v.slice(2);
}

return v;

}

function timeToMin(t){
const [h,m]=t.split(':').map(Number);
return h*60+m;
}

function renderCalendar(){

const cal=document.getElementById('calendar');

cal.innerHTML='';

const now = new Date(selectedDate);

const y=now.getFullYear();
const m=now.getMonth();

const last=new Date(y,m+1,0).getDate();

const today = new Date().toISOString().split('T')[0];

for(let d=1; d<=last; d++){

const dateKey =
`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const cls = `
day
${dateKey===today ? 'today':''}
${dateKey===selectedDate ? 'selected':''}
`;

cal.innerHTML += `
<div class="${cls}"
onclick="changeDate('${dateKey}')">
${d}
</div>
`;

}

}

function changeDate(date){

selectedDate=date;

renderCalendar();
renderRoutines();

}

function renderRoutines(){

const list=document.getElementById('routineList');

list.innerHTML='';

const data=currentData();

let total=0;

data.routines.forEach((r,idx)=>{

total += timeToMin(r.end)-timeToMin(r.start);

list.innerHTML += `
<div class="list-item" onclick="editRoutine(${idx})">

<div class="left">

<div class="dot"
style="background:${r.color}">
</div>

<div>

<div style="font-weight:600;">
${r.subject}
</div>

<div style="font-size:11px;color:#888;margin-top:4px;">
${r.start} - ${r.end}
</div>

</div>

</div>

<div style="font-size:12px;color:${r.color};">
${r.category}
</div>

</div>
`;

});

document.getElementById('goalRate').innerText =
Math.round((total/db.settings.goalMinutes)*100)+'%';

renderDDay();

}

function renderDDay(){

if(!db.settings.ddayDate){
document.getElementById('ddayText').innerText='D-DAY';
document.getElementById('ddayLabel').innerText='목표 없음';
return;
}

const diff=Math.ceil(
(new Date(db.settings.ddayDate)-new Date())/
(1000*60*60*24)
);

document.getElementById('ddayText').innerText='D-'+diff;
document.getElementById('ddayLabel').innerText=
db.settings.ddayTitle;

}

function renderCategories(){

const wrap=document.getElementById('categoryWrap');

wrap.innerHTML='';

categories.forEach((c,idx)=>{

wrap.innerHTML += `
<div class="category-item ${selectedCategory===idx ? 'active':''}"
onclick="selectCategory(${idx})">

<div class="category-dot"
style="background:${c.color}">
</div>

<div>${c.name}</div>

<div class="cat-actions">

<div onclick="event.stopPropagation();moveCategory(${idx},-1)">
↑
</div>

<div onclick="event.stopPropagation();moveCategory(${idx},1)">
↓
</div>

<div onclick="event.stopPropagation();deleteCategory(${idx})"
style="color:#ff8b8b;">
✕
</div>

</div>

</div>
`;

});

}

function selectCategory(idx){

selectedCategory=idx;

renderCategories();

}

function addCategory(){

const name=document.getElementById('newCategoryName').value.trim();
const color=document.getElementById('newCategoryColor').value;

if(!name){
alert('카테고리명을 입력하세요.');
return;
}

categories.push({name,color});

saveCategories();

document.getElementById('newCategoryName').value='';

renderCategories();

}

function deleteCategory(idx){

if(categories.length<=1){
alert('최소 1개 카테고리가 필요합니다.');
return;
}

const ok = confirm(
`"${categories[idx].name}" 카테고리를 삭제할까요?\n기존 루틴은 기본 카테고리로 변경됩니다.`
);

if(!ok){
return;
}

const removed = categories[idx];

categories.splice(idx,1);

Object.keys(db).forEach(key=>{

if(!db[key]?.routines){
return;
}

db[key].routines.forEach(r=>{

if(r.category===removed.name){
r.category=categories[0].name;
r.color=categories[0].color;
}

});

});

saveCategories();
saveDB();

selectedCategory=0;

renderCategories();
renderRoutines();

}

function moveCategory(idx,dir){

const target=idx+dir;

if(target<0 || target>=categories.length){
return;
}

[categories[idx],categories[target]] =
[categories[target],categories[idx]];

saveCategories();

renderCategories();

}

function openRoutineModal(){

editIndex=-1;

document.getElementById('routineModal').style.display='flex';

document.getElementById('deleteRoutineBtn').style.display='none';

document.getElementById('subject').value='';
document.getElementById('startInput').value='';
document.getElementById('endInput').value='';

selectedCategory=0;

renderCategories();

}

function editRoutine(idx){

editIndex=idx;

const r=currentData().routines[idx];

document.getElementById('routineModal').style.display='flex';

document.getElementById('deleteRoutineBtn').style.display='block';

document.getElementById('subject').value=r.subject;
document.getElementById('startInput').value=r.start;
document.getElementById('endInput').value=r.end;

selectedCategory=
categories.findIndex(v=>v.name===r.category);

if(selectedCategory<0){
selectedCategory=0;
}

renderCategories();

}

function saveRoutine(){

const category=categories[selectedCategory];

const obj={
subject:document.getElementById('subject').value,
start:formatTime(document.getElementById('startInput').value),
end:formatTime(document.getElementById('endInput').value),
color:category.color,
category:category.name
};

if(editIndex>-1){
currentData().routines[editIndex]=obj;
}else{
currentData().routines.push(obj);
}

saveDB();

closeModal('routineModal');

renderRoutines();

}

function deleteRoutine(){

if(editIndex<0){
return;
}

currentData().routines.splice(editIndex,1);

saveDB();

closeModal('routineModal');

renderRoutines();

}

function openGoalModal(){

document.getElementById('goalModal').style.display='flex';

document.getElementById('goalInput').value =
db.settings.goalMinutes;

}

function saveGoal(){

db.settings.goalMinutes =
Number(document.getElementById('goalInput').value);

saveDB();

closeModal('goalModal');

renderRoutines();

}

function openDDayModal(){

document.getElementById('ddayModal').style.display='flex';

document.getElementById('ddayTitle').value =
db.settings.ddayTitle || '';

document.getElementById('ddayDate').value =
db.settings.ddayDate || '';

}

function saveDDay(){

db.settings.ddayTitle =
document.getElementById('ddayTitle').value;

db.settings.ddayDate =
document.getElementById('ddayDate').value;

saveDB();

closeModal('ddayModal');

renderDDay();

}

function deleteDDay(){

db.settings.ddayTitle='';
db.settings.ddayDate='';

saveDB();

closeModal('ddayModal');

renderDDay();

}

function closeModal(id){
document.getElementById(id).style.display='none';
}

document.getElementById('review').addEventListener('input',e=>{

e.target.style.height='auto';
e.target.style.height=e.target.scrollHeight+'px';

currentData().review=e.target.value;

saveDB();

});

renderCalendar();
renderRoutines();

</script>

</body>
</html>
