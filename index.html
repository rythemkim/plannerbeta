<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>I'll WIN Planner Pro</title>

<style>
:root{
--main-border:#222;
--bg-gray:#f8f8f8;
--today-blue:#00c2ff;
}
body{
margin:0;
background:var(--bg-gray);
font-family:Pretendard,sans-serif;
font-size:13px;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
}
.global-header{
background:#fff;
padding:12px 18px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
}
.app-logo{
font-size:20px;
font-weight:900;
font-style:italic;
}
.page{
display:none;
padding:15px;
padding-bottom:85px;
overflow-y:auto;
background:#fff;
flex:1;
max-width:500px;
width:100%;
margin:auto;
box-sizing:border-box;
}
.page.active{display:block;}
.section{
border:1px solid #222;
padding:12px;
margin-bottom:15px;
background:#fff;
position:relative;
}
.title{
font-size:10px;
font-weight:bold;
border-bottom:1px solid #eee;
padding-bottom:5px;
margin-bottom:10px;
color:#777;
}
.nav-bar{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:500px;
height:60px;
background:#111;
display:flex;
}
.nav-item{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:10px;
color:#777;
}
.active-nav{
background:#222;
color:#fff;
}
.add-btn-sm{
position:absolute;
right:8px;
top:8px;
font-size:10px;
padding:4px 8px;
border:1px solid #ddd;
background:#f3f3f3;
}
.tt-container{
border:1px solid #eee;
}
.tt-row{
display:flex;
height:24px;
border-bottom:1px solid #eee;
}
.tt-time{
width:32px;
display:flex;
justify-content:center;
align-items:center;
font-size:9px;
background:#fafafa;
border-right:1px solid #eee;
}
.tt-slots{
flex:1;
display:grid;
grid-template-columns:repeat(6,1fr);
}
.slot{
position:relative;
border-right:1px solid #f5f5f5;
cursor:pointer;
}
.slot-label{
position:absolute;
left:2px;
top:2px;
font-size:7px;
white-space:nowrap;
}
.stat-row-top{
display:flex;
gap:10px;
}
.routine-col{
flex:1.2;
border:1px solid #222;
padding:10px;
position:relative;
}
.side-col{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}
.side-box{
flex:1;
border:1px solid #222;
padding:10px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
#routine-svg{
width:100%;
height:auto;
transform:rotate(-90deg);
}
.routine-time-label{
font-size:3px;
fill:#222;
transform:rotate(90deg);
transform-origin:center;
}
.list-item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px dashed #eee;
font-size:11px;
}
.month-card{
background:#000;
color:#fff;
padding:15px;
text-align:center;
margin-bottom:15px;
}
.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
}
.cal-day{
aspect-ratio:1;
background:#fafafa;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:10px;
}
.cal-study{
font-size:7px;
margin-top:2px;
}
#daily-review{
width:100%;
min-height:80px;
resize:none;
border:none;
outline:none;
font-size:14px;
overflow:hidden;
}
#modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:999;
}
.modal{
background:#fff;
width:85%;
max-width:320px;
padding:20px;
}
.modal input,.modal select{
width:100%;
height:44px;
margin-bottom:10px;
padding:0 10px;
box-sizing:border-box;
}
.modal button{
width:100%;
padding:12px;
margin-top:5px;
}
</style>
</head>

<body>

<header class="global-header">
<div class="app-logo">I'll WIN</div>
<input type="date" id="date-picker" onchange="syncDate(this.value)">
</header>

<div id="page1" class="page active">

<div class="section">
<div class="title">TO-DO LIST</div>
<div id="todo-list"></div>
</div>

<div class="section">
<div class="title">TIME TABLE</div>
<button class="add-btn-sm" onclick="openModal('timetable')">ADD</button>
<div class="tt-container" id="tt-rows"></div>
</div>

</div>

<div id="page2" class="page">

<div class="stat-row-top">

<div class="routine-col">
<div class="title">ROUTINE</div>
<button class="add-btn-sm" onclick="openModal('routine')">+</button>

<svg id="routine-svg" viewBox="0 0 32 32">
<circle r="16" cx="16" cy="16" fill="#f5f5f5"/>
<g id="routine-paths"></g>
<circle r="9" cx="16" cy="16" fill="white"/>
</svg>

<div id="routine-list-items"></div>
</div>

<div class="side-col">

<div class="side-box" onclick="openModal('study')">
<div class="title" style="margin:0;border:none;">STUDY</div>
<div id="disp-study" style="font-size:18px;font-weight:bold;">00:00</div>
</div>

</div>

</div>

<div class="section">
<div class="title">DAILY REVIEW</div>
<textarea id="daily-review" placeholder="오늘 하루는 어땠나요?"></textarea>
</div>

</div>

<div id="page3" class="page">

<div class="month-card">
<div>MONTH TOTAL</div>
<div id="monthly-study-val" style="font-size:28px;font-weight:bold;">0h 0m</div>
</div>

<div class="section">
<div class="title">STUDY CALENDAR</div>
<div class="calendar-grid" id="calendar-grid"></div>
</div>

</div>

<nav class="nav-bar">
<div class="nav-item active-nav" onclick="switchPage(1,this)">📅 PLAN</div>
<div class="nav-item" onclick="switchPage(2,this)">📊 STATS</div>
<div class="nav-item" onclick="switchPage(3,this)">⚙️ CAT</div>
</nav>

<div id="modal-overlay">
<div class="modal">
<div id="modal-inputs"></div>
<button onclick="saveModal()">SAVE</button>
<button onclick="closeModal()">CANCEL</button>
<button id="delete-btn" style="display:none;background:#ffd6d6;" onclick="deleteCurrent()">DELETE</button>
</div>
</div>

<script>

let selectedDate = new Date().toISOString().split('T')[0];
let currentMode = '';
let editIdx = -1;

let db = JSON.parse(localStorage.getItem('illWinDB')) || {};

const categories = [
{name:'전공',color:'#ffadad'},
{name:'교양',color:'#a0c4ff'},
{name:'기타',color:'#fdffb6'}
];

window.onload = function(){

document.getElementById('date-picker').value = selectedDate;

for(let i=0;i<6;i++){
document.getElementById('todo-list').innerHTML += `
<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;">
<input type="checkbox" id="td-c-${i}" onchange="saveCurrentDate()">
<input type="text" id="td-t-${i}" placeholder="할 일을 입력하세요..." oninput="saveCurrentDate()" style="border:none;outline:none;width:100%;padding-left:10px;">
</div>`;
}

document.getElementById('daily-review').addEventListener('input',autoResizeReview);

loadDateData();

}

function getData(){

if(!db[selectedDate]){
db[selectedDate] = {
todo:[],
tt:[],
routine:[],
study:'00:00',
review:''
};
}

return db[selectedDate];

}

function switchPage(p,el){

document.querySelectorAll('.page').forEach(v=>v.classList.remove('active'));
document.getElementById('page'+p).classList.add('active');

document.querySelectorAll('.nav-item').forEach(v=>v.classList.remove('active-nav'));
el.classList.add('active-nav');

if(p===3){
renderCalendar();
}

}

function syncDate(date){
selectedDate = date;
loadDateData();
}

function loadDateData(){

const data = getData();

for(let i=0;i<6;i++){

const item = data.todo[i] || {text:'',checked:false};

document.getElementById('td-t-'+i).value = item.text;
document.getElementById('td-c-'+i).checked = item.checked;

}

initTimeTable();

(data.tt || []).forEach((item,idx)=>{
fillTT(item,idx);
});

renderRoutine();

document.getElementById('disp-study').innerText = data.study || '00:00';

document.getElementById('daily-review').value = data.review || '';

autoResizeReview();

renderCalendar();
updateMonthlyTotal();

}

function saveCurrentDate(){

const data = getData();

data.todo = [];

for(let i=0;i<6;i++){
data.todo.push({
text:document.getElementById('td-t-'+i).value,
checked:document.getElementById('td-c-'+i).checked
});
}

data.review = document.getElementById('daily-review').value;

localStorage.setItem('illWinDB',JSON.stringify(db));

}

function initTimeTable(){

const rows = document.getElementById('tt-rows');

rows.innerHTML = '';

for(let h=6;h<=23;h++){

let slots='';

for(let m=0;m<60;m+=10){
slots += `<div class="slot" id="tt-${h}-${m}" onclick="slotClick(${h},${m})"></div>`;
}

rows.innerHTML += `
<div class="tt-row">
<div class="tt-time">${h}h</div>
<div class="tt-slots">${slots}</div>
</div>`;

}

}

function slotClick(h,m){

const data = getData();

const cur = h*60+m;

const idx = data.tt.findIndex(item=>{

const s = item.s.split(':').map(Number);
const e = item.e.split(':').map(Number);

return cur >= s[0]*60+s[1] && cur < e[0]*60+e[1];

});

if(idx>-1){
openModal('timetable',idx);
}

}

function fillTT(item){

const s = item.s.split(':').map(Number);
const e = item.e.split(':').map(Number);

let first = true;

for(let h=6;h<=23;h++){

for(let m=0;m<60;m+=10){

const cur = h*60+m;

if(cur >= s[0]*60+s[1] && cur < e[0]*60+e[1]){

const el = document.getElementById(`tt-${h}-${m}`);

if(el){

el.style.background = item.color;

if(first){
el.innerHTML = `<span class="slot-label">${item.desc}</span>`;
first = false;
}

}

}

}

}

}

function openModal(mode,idx=-1){

currentMode = mode;
editIdx = idx;

document.getElementById('modal-overlay').style.display = 'flex';

const area = document.getElementById('modal-inputs');

const data = getData();

document.getElementById('delete-btn').style.display = idx>-1 ? 'block':'none';

if(mode==='timetable' || mode==='routine'){

const key = mode==='timetable' ? 'tt':'routine';

const item = idx>-1 ? data[key][idx] : {s:'',e:'',desc:''};

area.innerHTML = `
<input type="time" step="600" id="m-s" value="${item.s}">
<input type="time" step="600" id="m-e" value="${item.e}">
<input type="text" id="m-desc" value="${item.desc || ''}" placeholder="내용">
<select id="m-cat">
${categories.map((c,i)=>`<option value="${i}">${c.name}</option>`).join('')}
</select>`;

}

if(mode==='study'){

area.innerHTML = `
<input type="text" id="m-study" value="${data.study || ''}" placeholder="730 / 0730 / 07:30">`;

}

}

function saveModal(){

const data = getData();

if(currentMode==='timetable' || currentMode==='routine'){

const key = currentMode==='timetable' ? 'tt':'routine';

const obj = {
s:document.getElementById('m-s').value,
e:document.getElementById('m-e').value,
desc:document.getElementById('m-desc').value,
color:categories[document.getElementById('m-cat').value].color
};

if(editIdx>-1){
data[key][editIdx] = obj;
}else{
data[key].push(obj);
}

}

if(currentMode==='study'){

let val = document.getElementById('m-study').value.replace(/[^0-9]/g,'');

if(val.length===3){
val = '0'+val;
}

if(val.length===4){
val = val.slice(0,2)+':'+val.slice(2);
}

data.study = val;

}

localStorage.setItem('illWinDB',JSON.stringify(db));

closeModal();
loadDateData();

}

function deleteCurrent(){

const data = getData();

if(currentMode==='timetable'){
data.tt.splice(editIdx,1);
}

if(currentMode==='routine'){
data.routine.splice(editIdx,1);
}

localStorage.setItem('illWinDB',JSON.stringify(db));

closeModal();
loadDateData();

}

function closeModal(){
document.getElementById('modal-overlay').style.display = 'none';
}

function drawArc(item){

const s = item.s.split(':').map(Number);
const e = item.e.split(':').map(Number);

const start = ((s[0]*60+s[1])/1440)*360 - 90;
const end = ((e[0]*60+e[1])/1440)*360 - 90;

const rad = Math.PI/180;

const x1 = 16 + 16*Math.cos(start*rad);
const y1 = 16 + 16*Math.sin(start*rad);

const x2 = 16 + 16*Math.cos(end*rad);
const y2 = 16 + 16*Math.sin(end*rad);

const largeArc = (end-start)>180 ? 1:0;

const path = document.createElementNS("http://www.w3.org/2000/svg","path");

path.setAttribute("d",`M 16 16 L ${x1} ${y1} A 16 16 0 ${largeArc} 1 ${x2} ${y2} Z`);
path.setAttribute("fill",item.color);

document.getElementById('routine-paths').appendChild(path);

const text = document.createElementNS("http://www.w3.org/2000/svg","text");

text.setAttribute("x","16");
text.setAttribute("y","4");
text.setAttribute("class","routine-time-label");
text.textContent = item.s;

document.getElementById('routine-paths').appendChild(text);

}

function renderRoutine(){

document.getElementById('routine-paths').innerHTML = '';

const list = document.getElementById('routine-list-items');

list.innerHTML = '';

const data = getData();

(data.routine || []).forEach((item,idx)=>{

drawArc(item);

list.innerHTML += `
<div class="list-item">
<span onclick="openModal('routine',${idx})">${item.s} ~ ${item.e} | ${item.desc}</span>
</div>`;

});

}

function autoResizeReview(){

const ta = document.getElementById('daily-review');

ta.style.height = 'auto';
ta.style.height = ta.scrollHeight + 'px';

saveCurrentDate();

}

function renderCalendar(){

const grid = document.getElementById('calendar-grid');

grid.innerHTML = '';

const [y,m] = selectedDate.split('-').map(Number);

const firstDay = new Date(y,m-1,1).getDay();
const lastDate = new Date(y,m,0).getDate();

for(let i=0;i<firstDay;i++){
grid.innerHTML += '<div></div>';
}

for(let d=1;d<=lastDate;d++){

const dStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const study = db[dStr]?.study || '00:00';

grid.innerHTML += `
<div class="cal-day">
<div>${d}</div>
<div class="cal-study">${study}</div>
</div>`;

}

}

function updateMonthlyTotal(){

const target = selectedDate.substring(0,7);

let total = 0;

for(let date in db){

if(date.startsWith(target)){

const study = db[date].study || '00:00';

const parts = study.split(':').map(Number);

total += (parts[0]*60)+(parts[1]||0);

}

}

document.getElementById('monthly-study-val').innerText =
`${Math.floor(total/60)}h ${total%60}m`;

}

</script>

</body>
</html>
